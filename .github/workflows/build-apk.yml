name: Build APK

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y python3-pip python3-dev build-essential git \
            autoconf libtool pkg-config zlib1g-dev libncurses5-dev \
            libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev \
            openjdk-17-jdk libltdl-dev
          pip install buildozer cython==0.29.37

      - name: Build APK
        id: build
        continue-on-error: true
        run: buildozer android debug

      - name: Fix aidl — install build-tools
        if: steps.build.outcome == 'failure'
        run: |
          SDK_DIR=$HOME/.buildozer/android/platform/android-sdk
          echo "Installing build-tools into $SDK_DIR"
          $SDK_DIR/cmdline-tools/latest/bin/sdkmanager --sdk_root=$SDK_DIR "build-tools;33.0.0"
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: autocompose-debug-apk
          path: bin/*.apk
